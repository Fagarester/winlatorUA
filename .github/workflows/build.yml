name: Build WinlatorUA
on: [workflow_dispatch] # Теперь только кнопка в Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'cmake;3.22.1'

      - name: Fix ALL Duplicate Libs
        run: |
          # Это правило разрешит дубликаты для ЛЮБЫХ файлов .so в проекте
          find . -name "build.gradle" -exec sed -i '/android {/a \    packagingOptions { jniLibs { pickFirsts.add("**/*.so") } }' {} +
          echo "Универсальное исправление дубликатов внесено."
      - name: Build APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          cd "$PROJECT_ROOT"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WinlatorUA-debug
          path: ./**/build/outputs/apk/debug/*.apk
